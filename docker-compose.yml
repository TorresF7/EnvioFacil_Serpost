services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        environment:
            APP_ENV: local

    nginx:
        image: nginx:alpine
        ports:
            - '8000:80'
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app

    vite:
        image: node:22
        working_dir: /app
        volumes:
            - ./:/app
        ports:
            - '5173:5173'
        command: npm run dev -- --host 0.0.0.0
